services:

  # ── Reverse Proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment for HTTPS (place fullchain.pem + privkey.pem in ./nginx/certs/):
      # - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "3"}

  # ── FastAPI Application ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      WEB_CONCURRENCY: "2"
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options: {max-size: "10m", max-file: "5"}

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
      --requirepass "${REDIS_PASSWORD:-changeme}"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options: {max-size: "5m", max-file: "2"}

volumes:
  redis_data:

networks:
  frontend:
  backend:
