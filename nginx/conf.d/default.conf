# ── Rate-limit zones ─────────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr  zone=search:10m   rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=read:10m     rate=60r/m;
limit_req_zone  $binary_remote_addr  zone=image:10m    rate=120r/m;
limit_req_zone  $binary_remote_addr  zone=global:10m   rate=200r/m;

# ── Bot / scraper User-Agent block ────────────────────────────────────────────
map $http_user_agent $is_bot {
    default                 0;
    ""                      1;
    ~*bot                   1;
    ~*crawler               1;
    ~*spider                1;
    ~*scraper               1;
    ~*wget                  1;
    ~*(curl/)               1;
    ~*python-requests       1;
    ~*go-http-client        1;
    ~*scrapy                1;
    ~*masscan               1;
    ~*nikto                 1;
    ~*sqlmap                1;
    ~*zgrab                 1;
    ~*HeadlessChrome        1;
    ~*PhantomJS             1;
    ~*AhrefsBot             1;
    ~*SemrushBot            1;
    ~*MJ12bot               1;
    ~*DotBot                1;
    ~*GPTBot                1;
    ~*ClaudeBot             1;
    ~*CCBot                 1;
    ~*DataForSeoBot         1;
    ~*ByteSpider            1;
}

server {
    listen 80;
    server_name _;

    # Block bots at Nginx level before hitting the app
    if ($is_bot) {
        return 403;
    }

    # Hide server identity
    server_tokens off;

    # Global rate limit
    limit_req zone=global burst=50 nodelay;
    limit_req_status 429;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-Frame-Options          "DENY"          always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "no-referrer"   always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # ── Stricter rate limits on specific endpoints ────────────────────────────
    location = / {
        limit_req zone=search burst=10 nodelay;
        proxy_pass         http://app:8000;
        include            /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /read {
        limit_req zone=read burst=20 nodelay;
        proxy_pass         http://app:8000;
        include            /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /image {
        limit_req zone=image burst=30 nodelay;
        proxy_pass         http://app:8000;
        include            /etc/nginx/conf.d/proxy_params.conf;
    }

    # Block common scanner / WordPress paths at Nginx (never reach the app)
    location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php|\.env|\.git|phpmyadmin) {
        return 404;
    }

    # Everything else
    location / {
        proxy_pass         http://app:8000;
        include            /etc/nginx/conf.d/proxy_params.conf;
    }

    # 429 custom response
    error_page 429 /429.html;
    location = /429.html {
        return 429 "Too many requests. Slow down.";
        add_header Content-Type text/plain;
    }
}
