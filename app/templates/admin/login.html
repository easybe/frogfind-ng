<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<style>
  body { font-family: monospace; background: #1a1a1a; color: #00ff41; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .box { border: 1px solid #00ff41; padding: 2rem; width: 320px; }
  h2 { margin: 0 0 1.5rem; text-align: center; letter-spacing: 4px; }
  input[type=password] { width: 100%; box-sizing: border-box; background: #0d0d0d; border: 1px solid #00ff41; color: #00ff41; padding: 0.5rem; font-family: monospace; font-size: 1rem; margin-bottom: 1rem; }
  input[type=password]:focus { outline: none; border-color: #00ff41; box-shadow: 0 0 6px #00ff41; }
  button { width: 100%; background: #00ff41; color: #0d0d0d; border: none; padding: 0.6rem; font-family: monospace; font-size: 1rem; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
  button:hover { background: #00cc33; }
  .error { color: #ff4141; margin-bottom: 1rem; font-size: 0.85rem; }
  .label { font-size: 0.75rem; margin-bottom: 0.3rem; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="box">
  <h2>// ADMIN //</h2>
  {% if error %}
  <div class="error">&#x26A0; {{ error }}</div>
  {% endif %}
  <form method="post" action="login">
    <div class="label">PASSWORD</div>
    <input type="password" name="password" autofocus autocomplete="current-password">
    <button type="submit">ENTER</button>
  </form>
</div>
</body>
</html>
